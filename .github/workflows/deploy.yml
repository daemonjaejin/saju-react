# 파일명: .github/workflows/deploy.yml

name: React Deploy to S3 + CloudFront

# main 브랜치에 push 될 때만 실행
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub이 제공하는 무료 Linux 서버에서 실행

    steps:
      # 1단계: 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2단계: Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3단계: 패키지 설치
      - name: Install dependencies
        run: npm ci

      # 4단계: 프로덕션 빌드
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://d1e2l8qv1z10s7.cloudfront.net

      # 5단계: AWS 자격증명 설정 (Secrets에서 가져옴)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6단계: S3에 빌드 결과물 업로드
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html"
          
          # index.html은 캐시 없이 별도 업로드 (항상 최신 버전 보장)
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      # 7단계: CloudFront 캐시 무효화 (새 버전 즉시 반영)
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
